[catalog]
alias = "convergence"

[package_manager]
js = "bun"

[tasks]
converge = "node scripts/run-converge.js {args}"
cli = "node scripts/run-converge.js {args}"
tui = "node scripts/run-converge.js {args}"
api = "node scripts/run-converge-server.js {args}"
server = "node scripts/run-converge-server.js {args}"
"trace:report" = "node scripts/agent-trace-report.js {args}"
check = "cargo check {args}"
build = "cargo build {args}"
fmt = "cargo fmt {args}"
"fmt:check" = "cargo fmt --check"
clippy = "cargo clippy --all-targets {args} -- -D warnings"
test = "node scripts/run-tests.js {args}"
"test:nextest" = "cargo nextest run -P ci {args}"
"test:cargo" = "cargo test {args}"
health = [
  { task = "fmt:check" },
  { task = "check" },
]
validate = [
  { task = "health" },
  { task = "clippy" },
  { task = "test" },
]
qa = [
  { task = "validate" },
]
